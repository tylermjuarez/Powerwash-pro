const DATA={driveways:{label:"Driveways",icon:"🏗️",jobs:[{name:"Standard Driveway",desc:"No stains, routine cleaning",steps:[{step:"Pre-treat",chem:"Sodium Hypochlorite (SH)",pct:"3%",mix:"3 parts SH (10-12%) + 7 parts water",notes:"Apply evenly, let dwell 3-5 min. Do NOT let dry."},{step:"Wash",chem:"Surface Cleaner",pct:"N/A",mix:"3,000–4,000 PSI with surface cleaner",notes:"Overlap passes to avoid striping."},{step:"Post-treat",chem:"Sodium Hypochlorite (SH)",pct:"3%",mix:"Same as pre-treat mix",notes:"Final rinse prevents regrowth."}],warnings:[],tips:["Always wet adjacent plants before applying SH.","Work in shade or overcast days when possible."]},{name:"Oil-Stained Driveway",desc:"Motor oil, grease, transmission fluid",steps:[{step:"Degreaser",chem:"Purple Power / Simple Green",pct:"Full to 1:3",mix:"Undiluted on stain. Large areas: 1 part degreaser : 3 parts water.",notes:"Dwell 5–10 min, agitate with stiff brush."},{step:"Hot Rinse",chem:"Water",pct:"N/A",mix:"Hot water preferred; 3,500+ PSI",notes:"Pre-rinse removes lifted grease."},{step:"Pre-treat",chem:"Sodium Hypochlorite (SH)",pct:"3-5%",mix:"3-5 parts SH (12%) + 7-9 parts water",notes:"Higher SH for stubborn organics."},{step:"Wash",chem:"Surface Cleaner",pct:"N/A",mix:"3,500-4,000 PSI",notes:""},{step:"Post-treat",chem:"SH",pct:"3%",mix:"Same as pre-treat",notes:"Final kill coat."}],warnings:["Do NOT mix alkaline degreasers with SH — neutralize and rinse between steps.","Some oil stains are permanent if oxidized into concrete."],tips:["Cat litter or baking soda can absorb fresh oil before treatment."]},{name:"Gum / Graffiti",desc:"Chewing gum, paint, stubborn adhesives",steps:[{step:"Freeze/Soften",chem:"Gum Freeze Spray or heat gun",pct:"N/A",mix:"Freeze spray for gum; heat gun for adhesive",notes:"Freeze makes gum brittle. Scrape off bulk first."},{step:"Solvent Treat",chem:"Goo Gone Pro / Taginator",pct:"Full strength",mix:"Apply direct, dwell 5 min",notes:"Match remover to paint type (latex vs oil)."},{step:"High Pressure Rinse",chem:"Water",pct:"N/A",mix:"Turbo nozzle 2,500-4,000 PSI",notes:""},{step:"Post-treat",chem:"SH",pct:"3%",mix:"",notes:"Kill remaining organics."}],warnings:["Solvents can damage surrounding asphalt sealcoat — mask edges.","Turbo nozzle on soft concrete can etch — test first."],tips:["Graffiti removers are most effective on fresh graffiti (under 48 hrs)."]}]},houses:{label:"Houses",icon:"🏠",jobs:[{name:"Vinyl Siding",desc:"Most common siding — very forgiving",steps:[{step:"Wet Landscaping",chem:"Water",pct:"N/A",mix:"Pre-soak all plants within 10 ft",notes:"Critical before any SH application."},{step:"Soft Wash Mix",chem:"SH + Surfactant",pct:"1-3% SH",mix:"1 gal SH (12%) + 1-3 oz surfactant + 3-5 gal water",notes:"Low pressure only — under 500 PSI or downstream inject."},{step:"Dwell",chem:"N/A",pct:"N/A",mix:"Wait 5-10 min",notes:"Do NOT let dry. Mist with water if drying fast."},{step:"Rinse",chem:"Water",pct:"N/A",mix:"1,500-2,000 PSI, top to bottom",notes:"Rinse plants after too."}],warnings:[],tips:["Surfactant (Elemonator) is a must — clings to surface and boosts SH.","Rinse windows immediately — SH hazes glass when dry."]},{name:"Hardiplank / Fiber Cement",desc:"James Hardie board — painted cement composite",steps:[{step:"Wet Landscaping",chem:"Water",pct:"N/A",mix:"",notes:""},{step:"Soft Wash Mix",chem:"SH + Surfactant",pct:"1-2% SH",mix:"1 gal SH + 4-6 gal water + surfactant",notes:"Fiber cement holds SH longer — less is needed."},{step:"Dwell",chem:"N/A",pct:"N/A",mix:"5-8 min",notes:""},{step:"Rinse",chem:"Water",pct:"N/A",mix:"1,200-1,800 PSI",notes:"Too high chips paint or forces water behind seams."}],warnings:["NEVER use high pressure on Hardiplank — cracks, chips paint, voids warranty.","Prolonged SH dwell can bleach or fade colored panels."],tips:["Check for failing caulk seams before washing — water intrusion risk.","Bid higher — Hardiplank requires extra care."]},{name:"Wood Siding",desc:"Cedar, pine — painted or stained",steps:[{step:"Wet Landscaping",chem:"Water",pct:"N/A",mix:"",notes:""},{step:"Wood Cleaner",chem:"Oxalic Acid OR Sodium Percarbonate",pct:"1:10 to 1:20",mix:"OxiClean or F18 Wood Cleaner",notes:"Brightens grain, removes tannin stains."},{step:"Light SH (if mold present)",chem:"SH + Surfactant",pct:"0.5-1% max",mix:"Very light application only",notes:"Straight SH grays natural wood — minimize use."},{step:"Low Pressure Rinse",chem:"Water",pct:"N/A",mix:"500-1,200 PSI MAX",notes:"Always rinse WITH the grain direction."}],warnings:["HIGH PRESSURE DESTROYS WOOD — fuzzing, splintering, lifts grain permanently.","SH too strong will gray and damage unfinished wood."],tips:["After cleaning, upsell a wood sealer or stain.","Look for peeling paint — washing can strip it and cause a dispute."]},{name:"Brick Siding",desc:"Painted or unpainted brick",steps:[{step:"Pre-wet Brick",chem:"Water",pct:"N/A",mix:"Saturate brick first — prevents cleaner absorption into mortar",notes:""},{step:"Efflorescence Treatment",chem:"Muriatic Acid (10:1) or Sure Klean 600",pct:"10:1 water:acid",mix:"Water first, then acid — NEVER reverse",notes:"Only if efflorescence present. Skip if clean."},{step:"Soft Wash for Organics",chem:"SH + Surfactant",pct:"2-3%",mix:"",notes:"Mold, algae, mildew responds well to SH."},{step:"Rinse",chem:"Water",pct:"N/A",mix:"2,000-2,500 PSI",notes:"Brick is durable — more pressure OK."},{step:"Neutralize (if acid used)",chem:"Baking Soda Solution",pct:"~1 tbsp/gal",mix:"",notes:"Only if muriatic acid was applied."}],warnings:["NEVER use muriatic acid on painted brick — strips paint.","NEVER use acid without full PPE — respirator, gloves, goggles, rubber apron.","DO NOT use acid near plants or metal fixtures."],tips:["Efflorescence is salt, not mold — SH alone won't remove it.","Historic unpainted brick: lower PSI, no acid — consult a mason."]},{name:"Stucco",desc:"Traditional or synthetic (EIFS/Dryvit)",steps:[{step:"Identify Stucco Type",chem:"N/A",pct:"N/A",mix:"Traditional = hard. EIFS (Dryvit) = soft/spongy when pressed.",notes:"Treatment differs significantly!"},{step:"Soft Wash — Traditional",chem:"SH + Surfactant",pct:"2-3%",mix:"",notes:"Standard soft wash. Rinse at 1,500-2,000 PSI."},{step:"Soft Wash — EIFS/Synthetic",chem:"SH + Surfactant",pct:"1-2%",mix:"Low pressure ONLY — under 500 PSI",notes:"EIFS is foam underneath — water intrusion is catastrophic."}],warnings:["EIFS/Dryvit is extremely fragile — high pressure cracks coating and floods foam core.","Visible cracks in stucco: do NOT wash — water gets inside. Flag for repair first."],tips:["Hairline cracks are everywhere — photograph before washing to protect yourself."]},{name:"Aluminum Siding",desc:"Older painted aluminum panels",steps:[{step:"Wet Landscaping",chem:"Water",pct:"N/A",mix:"",notes:""},{step:"Soft Wash",chem:"SH + Surfactant",pct:"1-2%",mix:"",notes:"Aluminum responds very well to soft washing."},{step:"Oxidation Treatment",chem:"F9 Barc or dilute phosphoric acid",pct:"Per label",mix:"For chalky/oxidized aluminum only",notes:"Restores original color and shine."},{step:"Rinse",chem:"Water",pct:"N/A",mix:"1,500-2,000 PSI",notes:""}],warnings:["Do NOT use muriatic acid on aluminum — causes black staining and corrosion.","High pressure can dent aluminum panels — 2,000 PSI max."],tips:["Chalky oxidation is common — brightener is a great upsell.","Check for loose or missing panels before washing — liability issue."]}]},roofs:{label:"Roofs",icon:"🏚️",jobs:[{name:"Asphalt Shingle",desc:"3-Tab or Architectural — black streak algae",steps:[{step:"Protect Landscaping",chem:"Water",pct:"N/A",mix:"Tarps for delicate plants, pre-soak everything",notes:""},{step:"Soft Wash — Apply",chem:"SH + Surfactant",pct:"4-6% SH",mix:"4-6 parts SH (12%) + 4-6 parts water + 2-4 oz surfactant/gal",notes:"Low pressure only — downstream or 12v soft wash pump. NEVER pressure wash shingles."},{step:"Dwell",chem:"N/A",pct:"N/A",mix:"10-20 min dwell",notes:"Mist with water if drying — don't let it sit dry."},{step:"Rinse",chem:"Water",pct:"N/A",mix:"Garden hose or 500 PSI MAX",notes:"Let gravity work. Rinse top to bottom."}],warnings:["NEVER use high pressure on asphalt shingles — removes granules, voids warranty, causes failure.","SH WILL damage plants — protect everything and rinse thoroughly.","Do NOT walk on wet shingles — extremely slippery."],tips:["Black streaks may not disappear same-day — SH kills algae but discoloration fades over 1-4 weeks with rain. Tell customers upfront!","ARMA approves soft washing — use this to justify your method."]},{name:"Metal Roof",desc:"Standing seam, corrugated steel or aluminum",steps:[{step:"Pre-rinse",chem:"Water",pct:"N/A",mix:"2,000-3,000 PSI",notes:"Loosen surface debris."},{step:"Soft Wash for Organics",chem:"SH + Surfactant",pct:"2-3%",mix:"",notes:"Lower SH than shingles — metal doesn't absorb."},{step:"Dwell",chem:"N/A",pct:"N/A",mix:"5-8 min",notes:""},{step:"Rinse",chem:"Water",pct:"N/A",mix:"2,000-2,500 PSI",notes:"Metal handles more pressure — rinse thoroughly."},{step:"Rust Treatment (if needed)",chem:"F9 Barc or Oxalic Acid",pct:"Per label or 1:10",mix:"Apply to rust streaks only",notes:"Neutralize after with baking soda solution."}],warnings:["Do NOT use muriatic acid on metal roofs — causes rapid corrosion.","Check for loose or damaged seams/panels before walking.","High SH on unpainted galvanized metal can cause white oxidation — dilute more."],tips:["Metal roofs still get lichen and algae — great recurring service opportunity.","Rust streaks usually come from fasteners, not the panels."]},{name:"Clay / Concrete Tile",desc:"Spanish/Mediterranean tile",steps:[{step:"Blow Off Debris",chem:"N/A",pct:"N/A",mix:"Leaf blower to clear gutters and valleys",notes:"Debris causes backup and water damage."},{step:"Soft Wash for Lichen/Algae",chem:"SH + Surfactant",pct:"4-6%",mix:"Strong mix — lichen is tough",notes:"Apply to all surfaces including under tile lips."},{step:"Dwell",chem:"N/A",pct:"N/A",mix:"10-20 min (lichen may need 20+ min)",notes:""},{step:"Rinse",chem:"Water",pct:"N/A",mix:"1,500-2,500 PSI max",notes:"Tile is durable but can crack under wand impact."}],warnings:["NEVER walk on clay tile — cracks under direct foot pressure. Use roof bracket/ladder system.","Lichen may require re-treatment or overnight chemical dwell."],tips:["Lichen: SH kills it but takes weeks to fall off — set customer expectations.","Broken tiles are common to find — document and upsell repair referrals."]},{name:"Cedar / Wood Shake",desc:"Natural wood shingles",steps:[{step:"Wet Landscaping",chem:"Water",pct:"N/A",mix:"",notes:""},{step:"Wood Cleaner",chem:"Sodium Percarbonate or F18",pct:"Per label (1:8 to 1:16)",mix:"Oxygen-based — safer for wood than SH",notes:"Brightens and removes gray weathering."},{step:"Light SH (if heavy algae/moss)",chem:"SH + Surfactant",pct:"1-2% max",mix:"",notes:"Minimal SH — shakes degrade with heavy bleach."},{step:"Dwell",chem:"N/A",pct:"N/A",mix:"8-12 min",notes:""},{step:"Very Low Pressure Rinse",chem:"Water",pct:"N/A",mix:"500-800 PSI MAX, wide fan tip",notes:"Rinse WITH the grain, never across."}],warnings:["HIGH PRESSURE DESTROYS CEDAR SHAKE — splits fibers, causes premature rot.","High SH rots and permanently bleaches wood gray.","Probe suspect areas before walking — rot damage may be underneath."],tips:["Cedar shake is premium — charge accordingly.","Apply wood preservative/sealer after cleaning — great upsell.","Many cedar shake roofs are 20-40 years old — be honest about condition."]},{name:"TPO / EPDM Flat Roof",desc:"Commercial flat membranes",steps:[{step:"Inspect First",chem:"N/A",pct:"N/A",mix:"",notes:"Look for bubbles, seam lifting, pooling water. Do not wash a damaged membrane."},{step:"Low Pressure Rinse",chem:"Water",pct:"N/A",mix:"1,000-1,500 PSI",notes:"Remove dirt and debris."},{step:"Mild Soft Wash",chem:"SH + Surfactant",pct:"1-2%",mix:"",notes:"Flat roofs don't need heavy SH. Avoid seams."},{step:"Full Rinse",chem:"Water",pct:"N/A",mix:"Check drains are flowing",notes:""}],warnings:["Do NOT use solvents or petroleum cleaners on EPDM — degrades rubber membrane.","High pressure at seams can lift or crack membrane bonds.","Standing water after rinse = blocked drain — must be resolved before leaving."],tips:["TPO is white — shows dirt badly but cleans easily.","Flag any issues you see — upsell a roofer referral."]},{name:"Slate Roof",desc:"Natural stone slate — expensive, delicate",steps:[{step:"Inspect — DO NOT WALK",chem:"N/A",pct:"N/A",mix:"",notes:"Use roof bracket or long-reach wand only. Never step directly on slate."},{step:"Very Light Soft Wash",chem:"SH + Surfactant",pct:"1-2%",mix:"Apply from eave to ridge — pump sprayer or soft wash only",notes:""},{step:"Natural Rinse",chem:"Water",pct:"N/A",mix:"Let rain rinse — or gentle garden hose from above",notes:"DO NOT pressure rinse slate."}],warnings:["Slate cracks instantly under foot pressure — one wrong step = $500+ repair.","NEVER use pressure washer on slate — cracks slate, dislodges flashings.","Check flashing around chimneys — common failure point."],tips:["Most contractors decline slate — if you take it on, charge a premium.","Lichen is very common on slate — SH kills it but takes weeks to shed."]}]},hardscapes:{label:"Hardscapes",icon:"🧱",jobs:[{name:"Pavers",desc:"Brick, concrete, travertine — driveways, patios",steps:[{step:"Pre-treat Weeds/Moss",chem:"SH + Surfactant",pct:"3-5%",mix:"",notes:"Especially in joints between pavers."},{step:"Surface Clean",chem:"Surface Cleaner",pct:"N/A",mix:"2,500-3,500 PSI",notes:"Keeps cleaning even — wand marks are visible on pavers."},{step:"Joint Treatment",chem:"SH",pct:"3%",mix:"Lightly treat joints",notes:"Kills weed seeds and moss roots in joints."},{step:"Rinse",chem:"Water",pct:"N/A",mix:"Low pressure rinse",notes:"High pressure removes polymeric joint sand."}],warnings:["HIGH PRESSURE IN JOINTS REMOVES POLYMERIC SAND — expensive to replace.","Travertine is porous and softer — max 2,000 PSI, no acid."],tips:["After cleaning, recommend paver sealing — protects and prevents weed growth.","Polymeric sand reseal is a great upsell."]},{name:"Pool Deck",desc:"Concrete or pavers around pools",steps:[{step:"Cover or Drain Pool",chem:"N/A",pct:"N/A",mix:"Cover pool — SH disrupts pool chemistry",notes:""},{step:"Pre-treat",chem:"SH + Surfactant",pct:"2-3%",mix:"",notes:"Lower concentration near pool."},{step:"Surface Clean",chem:"Surface Cleaner",pct:"N/A",mix:"2,500-3,000 PSI",notes:""},{step:"Rinse — Away from Pool",chem:"Water",pct:"N/A",mix:"Direct hose/wand to drain away from water",notes:""}],warnings:["SH in pool water spikes chlorine and pH — can harm swimmers and damage pool liner.","Muriatic acid near pool coping: NEVER — destroys liner and equipment."],tips:["Tell customer to test pool chemistry and wait 24 hours before swimming."]},{name:"Fences",desc:"Wood, vinyl, metal, chain link",steps:[{step:"Wood Fence",chem:"SH + Surfactant or Sodium Percarbonate",pct:"SH 1-2% or per label",mix:"",notes:"500-1,000 PSI, rinse with grain."},{step:"Vinyl Fence",chem:"SH + Surfactant",pct:"2-3%",mix:"",notes:"Low-medium pressure OK — vinyl is durable."},{step:"Metal / Chain Link",chem:"SH + Surfactant",pct:"2%",mix:"",notes:"2,000-2,500 PSI. Treat rust with oxalic acid."}],warnings:["High pressure on wood fences causes grain fuzzing and splintering.","Check post bases for rot before washing — washing exposes hidden rot."],tips:["Fence washing + sealing is an easy recurring annual upsell."]}]}};
function chemColor(c){if(c.includes("SH")||c.includes("Sodium Hypo"))return"#3b82f6";if(c.includes("Surfactant")||c.includes("Elemonator"))return"#8b5cf6";if(c.includes("Degreaser")||c.includes("Purple")||c.includes("Simple Green"))return"#f59e0b";if(c.includes("Acid")||c.includes("F9")||c.includes("phosphoric")||c.includes("Muriatic"))return"#ef4444";if(c.includes("Wood")||c.includes("Oxalic")||c.includes("Percarbonate")||c.includes("OxiClean"))return"#10b981";if(c==="Water")return"#06b6d4";return"#64748b";}
let currentTab="driveways",currentView="jobs",currentJob=0;
function render(){const cat=DATA[currentTab];const content=document.getElementById("content");const backBtn=document.getElementById("back-btn");const logo=document.getElementById("logo");const headerTitle=document.getElementById("header-title");const headerSub=document.getElementById("header-sub");const infoBtn=document.getElementById("info-btn");if(currentView==="detail"){backBtn.style.display="flex";logo.style.display="none";headerTitle.textContent=cat.jobs[currentJob].name;headerSub.textContent="";infoBtn.style.display="none";}else{backBtn.style.display="none";logo.style.display="flex";headerTitle.textContent="POWERWASH PRO";headerSub.textContent="Chemical Reference";infoBtn.style.display="block";infoBtn.className=currentView==="legend"?"active":"";infoBtn.textContent=currentView==="legend"?"✕":"ℹ";}if(currentView==="legend"){content.innerHTML=renderLegend();return;}if(currentView==="jobs"){content.innerHTML=renderJobs(cat);return;}if(currentView==="detail"){content.innerHTML=renderDetail(cat.jobs[currentJob]);return;}}
function renderJobs(cat){let html=`<div class="section-label">${cat.icon} ${cat.label} — ${cat.jobs.length} Job Types</div>`;cat.jobs.forEach((j,i)=>{let badges=`<span class="badge badge-steps">${j.steps.length} steps</span>`;if(j.warnings.length)badges+=`<span class="badge badge-warn">⚠ ${j.warnings.length} warning${j.warnings.length>1?"s":""}</span>`;if(j.tips&&j.tips.length)badges+=`<span class="badge badge-tip">💡 ${j.tips.length} tip${j.tips.length>1?"s":""}</span>`;html+=`<div class="job-card" onclick="openJob(${i})"><div style="flex:1;"><div class="job-name">${j.name}</div><div class="job-desc">${j.desc}</div><div class="job-badges">${badges}</div></div><div class="chevron">›</div></div>`;});return html;}
function renderDetail(job){let html=`<div class="job-desc-line">${job.desc}</div>`;if(job.warnings.length){html+=`<div class="warn-box"><div class="warn-title">⚠ Warnings</div>`;job.warnings.forEach(w=>{html+=`<div class="warn-row"><span class="warn-x">✕</span><span class="warn-text">${w}</span></div>`;});html+=`</div>`;}html+=`<div class="section-label">Protocol — ${job.steps.length} Steps</div>`;job.steps.forEach((s,i)=>{const col=chemColor(s.chem);html+=`<div class="step-card" id="step-${i}" onclick="toggleStep(${i})"><div class="step-row"><div class="step-num">${i+1}</div><div class="step-info"><div class="step-label">${s.step}</div><div class="step-chem">${s.chem}</div></div><div class="step-right"><div class="pct-chip" style="background:${col}22;border:1px solid ${col}55;color:${col};">${s.pct}</div><div class="step-arrow" id="arrow-${i}">▼</div></div></div><div class="step-detail">${s.mix?`<div class="detail-label">Mix Ratio</div><div class="mix-box">${s.mix}</div>`:""}${s.notes?`<div class="detail-label">Notes</div><div class="notes-text">${s.notes}</div>`:""}${!s.mix&&!s.notes?`<div class="notes-text" style="margin-top:12px;color:#475569;">No additional details.</div>`:""}</div></div>`;});if(job.tips&&job.tips.length){html+=`<div class="tips-box"><div class="tips-title">💡 Pro Tips</div>`;job.tips.forEach(t=>{html+=`<div class="tip-row"><span class="tip-arrow">→</span><span class="tip-text">${t}</span></div>`;});html+=`</div>`;}return html;}
function renderLegend(){return`<div class="page-title">Reference Guide</div><div class="legend-card"><div class="legend-title">Chemical Color Key</div>${[["SH / Sodium Hypochlorite","#3b82f6"],["Surfactant / Soap","#8b5cf6"],["Degreaser","#f59e0b"],["Acid / Oxidizer","#ef4444"],["Wood Cleaner / Percarbonate","#10b981"],["Water","#06b6d4"],["Other","#64748b"]].map(([n,c])=>`<div class="legend-row"><div class="dot" style="background:${c};"></div><span class="legend-text">${n}</span></div>`).join("")}</div><div class="legend-card"><div class="legend-title">SH Concentration Guide</div>${[["0.5–1%","#06b6d4","Delicate (cedar, EIFS, slate)"],["1–2%","#3b82f6","Light duty (aluminum, Hardiplank)"],["2–3%","#8b5cf6","Standard (vinyl, brick, metal)"],["4–6%","#f59e0b","Heavy (shingles, tile roofs)"],["6%+","#ef4444","Max — extreme algae/mold only"]].map(([p,c,d])=>`<div class="pct-row"><div class="pct-label" style="background:${c}22;border:1px solid ${c}44;color:${c};">${p}</div><span class="pct-desc">${d}</span></div>`).join("")}</div><div class="warn-box"><div class="warn-title">⚠️ Always Wear PPE</div>${["Chemical-resistant gloves","Eye / face protection","Non-slip rubber boots","Respirator when using acids"].map(i=>`<div class="warn-row"><span class="warn-x">•</span><span class="warn-text">${i}</span></div>`).join("")}</div><div class="warn-box"><div class="warn-title">🚫 NEVER Mix</div>${["SH (bleach) + ANY acid","Bleach + ammonia","Degreaser + SH (always rinse between)"].map(i=>`<div class="warn-row"><span class="warn-x">✕</span><span class="warn-text">${i}</span></div>`).join("")}</div>`;}
function switchTab(key,el){currentTab=key;currentJob=0;currentView="jobs";document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");render();}
function openJob(i){currentJob=i;currentView="detail";render();}
function goBack(){currentView="jobs";render();}
function toggleLegend(){currentView=currentView==="legend"?"jobs":"legend";render();}
function toggleStep(i){const card=document.getElementById("step-"+i);const arrow=document.getElementById("arrow-"+i);const isOpen=card.classList.contains("open");document.querySelectorAll(".step-card").forEach(c=>c.classList.remove("open"));document.querySelectorAll(".step-arrow").forEach(a=>a.textContent="▼");if(!isOpen){card.classList.add("open");arrow.textContent="▲";}}
render();
</script>
</body>
</html>
